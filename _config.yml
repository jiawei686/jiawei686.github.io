# Permalinks
permalink: /:year/:month/:day/:title/

# syntax highlight
markdown: kramdown
kramdown:
    input: GFM
    syntax_highlighter: rouge
    math_engine: mathjax

# Setup
url:              https://cuijiawei.cn
# serve (jekyll serve) overrides `url` to http://localhost:4000 at runtime,
# so SEO/canonical/sitemap must use this explicit key instead of `site.url`.
seo_url:          https://cuijiawei.cn

# Set to "" in case of hosting on `http://<your-github-name>.github.io`
baseurl:          ""

title:            Jiawei's Blog

# Markdown enabled, however don't use more than one paragraph (enforced by `>`)
description:      >
    Notes on LLMs, deep learning, and building things that work.

# SEO: keywords help Baidu/other engines; the three names make the site
# discoverable for "cuijiawei", "kiritocui", and "崔家维" searches.
keywords:         "cuijiawei, kiritocui, 崔家维, Jiawei Cui, LLM, large language models, deep learning, transformer, machine learning, AI blog, paper deep-dive"

# The tags listed as entries in the sidebar
sidebar_tags:     [llm, ai, data, projects, engineering]

# Fallback image and color if not overwritten for tag or post
image:            /public/img/nap.jpg
color:            "#656565"

author:
  name:           "Jiawei Cui"
  # Alternate spellings / handles — used in JSON-LD so search engines
  # associate them with this site without showing them on the page.
  alternate_names: ["kiritocui", "崔家维", "cuijiawei"]
  github:         jiawei686
  photo:          /public/img/head.jpg

  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about: |
    I'm Jiawei — a developer who spent years shipping software (networking,
    distributed systems) and is now going all-in on AI and machine learning.

    This blog is where I think in public: deep dives into LLMs and the papers
    behind them, practical ML, and the occasional build. Formerly writing code
    for a living; now training and shipping models.

    *Don't you close your eyes.*
